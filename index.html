<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Performance - Xertica.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #cbd5e1; 
            overflow-x: hidden;
        }
        .bg-blur-sky { 
            position: fixed; 
            top: -10%; 
            left: -10%; 
            width: 40%; 
            height: 40%; 
            background: rgba(14, 165, 233, 0.1); 
            filter: blur(120px); 
            border-radius: 50%; 
            pointer-events: none; 
        }
        .bg-blur-emerald { 
            position: fixed; 
            bottom: -10%; 
            right: -10%; 
            width: 30%; 
            height: 30%; 
            background: rgba(16, 185, 129, 0.05); 
            filter: blur(100px); 
            border-radius: 50%; 
            pointer-events: none; 
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-blur-sky"></div>
    <div class="bg-blur-emerald"></div>

    <div class="relative z-10 max-w-7xl mx-auto px-6 py-8">
        <header class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
            <div>
                <div class="flex items-center gap-3 mb-4">
                    <img src="https://storage.googleapis.com/etp-bucket/Logos%20Xertica.ai%20(.png)/xertica.ai/Copy%20of%20Logo_XERTICA_white.png" alt="Xertica" class="h-6" onerror="this.src='https://via.placeholder.com/120x30/000000/FFFFFF?text=Xertica.ai'">
                    <div class="h-4 w-px bg-white/20"></div>
                    <span class="text-xs font-bold tracking-[0.3em] uppercase text-slate-500">Analytics de Campanha</span>
                </div>
                <h1 class="text-4xl font-extrabold text-white tracking-tight">Painel de Performance</h1>
                <p id="campaign-desc" class="text-slate-400 mt-2 max-w-xl transition-all duration-300">
                    Foco na modernização do setor público. 
                    <span class="ml-2 px-2 py-0.5 bg-white/5 rounded text-sky-400 text-xs font-mono">Ref: 16/03/2026</span>
                </p>
            </div>
            
            <div class="flex bg-slate-900/50 p-1 rounded-2xl border border-white/5 backdrop-blur-xl">
                <button onclick="switchTab('summit')" id="btn-summit" class="px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-300">
                    Public Sector Summit
                </button>
                <button onclick="switchTab('enastic')" id="btn-enastic" class="px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-300">
                    Enastic
                </button>
            </div>
        </header>

        <!-- KPI Grid -->
        <div id="kpi-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10 fade-in">
        </div>

        <!-- Conteúdo Principal -->
        <div class="w-full bg-slate-900/40 backdrop-blur-md border border-white/10 p-8 rounded-3xl shadow-2xl fade-in">
            <h3 class="text-lg font-bold text-white flex items-center gap-2 mb-8">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-emerald-400" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                Estado de Comunicação Detalhado (WhatsApp)
            </h3>
            
            <div id="stats-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            </div>

            <div class="pt-4">
                <div class="flex justify-between items-end mb-3">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Distribuição Visual do Funil</span>
                    <span id="interest-info" class="text-xs text-sky-400 font-bold"></span>
                </div>
                <div id="funnel-bar" class="flex h-6 w-full rounded-full overflow-hidden shadow-2xl bg-white/5 border border-white/5">
                </div>
            </div>
        </div>
    </div>

    <script>
        const data = {
            summit: {
                desc: "Foco na modernização do setor público. <span class='ml-2 px-2 py-0.5 bg-white/5 rounded text-sky-400 text-xs font-mono'>Ref: 16/03/2026</span>",
                interest: "",
                kpis: [
                    { label: "Mensagens Totais", value: "323", color: "text-white" },
                    { label: "Taxa de Leitura", value: "39.6%", color: "text-pink-500" },
                    { label: "Respostas", value: "12", color: "text-emerald-400" },
                    { label: "Taxa de Entrega", value: "67.5%", color: "text-sky-400" }
                ],
                stats: [
                    { status: "Lida", qty: 128, pct: "39.6%", color: "bg-pink-500", text: "text-pink-500" },
                    { status: "Não Entregue (ERRO)", qty: 105, pct: "32.5%", color: "bg-red-500", text: "text-red-500" },
                    { status: "Entregue", qty: 78, pct: "24.1%", color: "bg-sky-400", text: "text-sky-400" },
                    { status: "Respondida", qty: 12, pct: "3.7%", color: "bg-emerald-400", text: "text-emerald-400" }
                ]
            },
            enastic: {
                desc: "Estratégias de IA para o Ecossistema de Justiça. <span class='ml-2 px-2 py-0.5 bg-white/5 rounded text-sky-400 text-xs font-mono'>Ref: 18/03/2026</span>",
                interest: "",
                kpis: [
                    { label: "Mensagens Totais", value: "90", color: "text-white" },
                    { label: "Taxa de Leitura", value: "27.7%", color: "text-pink-500" },
                    { label: "Respostas", value: "1", color: "text-emerald-400" },
                    { label: "Taxa de Entrega", value: "45.5%", color: "text-sky-400" }
                ],
                stats: [
                    { status: "Lido", qty: 25, pct: "27.7%", color: "bg-pink-500", text: "text-pink-500" },
                    { status: "Entregue", qty: 15, pct: "16.7%", color: "bg-sky-400", text: "text-sky-400" },
                    { status: "Respondido", qty: 1, pct: "1.1%", color: "bg-emerald-400", text: "text-emerald-400" },
                    { status: "Erro", qty: 49, pct: "54.4%", color: "bg-red-500", text: "text-red-500" }
                ]
            }
        };

        function switchTab(tab) {
            const campaign = data[tab];
            const btnSummit = document.getElementById('btn-summit');
            const btnEnastic = document.getElementById('btn-enastic');
            
            const activeClass = 'bg-sky-500 text-slate-950 shadow-lg shadow-sky-500/20';
            const inactiveClass = 'text-slate-400 hover:text-white';

            if (tab === 'summit') {
                btnSummit.className = `px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-300 ${activeClass}`;
                btnEnastic.className = `px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-300 ${inactiveClass}`;
            } else {
                btnSummit.className = `px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-300 ${inactiveClass}`;
                btnEnastic.className = `px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-300 ${activeClass}`;
            }

            document.getElementById('campaign-desc').innerHTML = campaign.desc;
            document.getElementById('interest-info').innerText = campaign.interest;

            const kpiContainer = document.getElementById('kpi-container');
            kpiContainer.classList.remove('fade-in');
            void kpiContainer.offsetWidth; 
            kpiContainer.classList.add('fade-in');
            
            kpiContainer.innerHTML = campaign.kpis.map(kpi => `
                <div class="group bg-slate-900/40 backdrop-blur-md border border-white/10 p-6 rounded-3xl hover:border-white/20 transition-all duration-300">
                    <h3 class="text-slate-400 text-sm font-medium">${kpi.label}</h3>
                    <p class="text-3xl font-bold ${kpi.color} mt-1">${kpi.value}</p>
                </div>
            `).join('');

            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = campaign.stats.map(s => `
                <div class="flex flex-col p-6 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/[0.08] transition-all">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-3.5 h-3.5 rounded-full ${s.color} shadow-sm"></div>
                        <div class="text-[10px] text-slate-500 font-mono font-bold">${s.pct}</div>
                    </div>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">${s.status}</span>
                    <div class="text-2xl font-black text-white">${s.qty}</div>
                </div>
            `).join('');

            document.getElementById('funnel-bar').innerHTML = campaign.stats.map(s => `
                <div style="width: ${s.pct}" class="${s.color} h-full border-r border-black/20 last:border-0 transition-all duration-500" title="${s.status}: ${s.pct}"></div>
            `).join('');
        }

        window.onload = () => switchTab('summit');
    </script>
</body>
</html>
